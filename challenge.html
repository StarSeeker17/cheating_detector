<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Telemetry Sensor</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #editor-container { width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 4px; }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        button { padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        #run-btn { background-color: #28a745; }
        #run-btn:hover { background-color: #218838; }
        #submit-btn { background-color: #0056b3; }
        #submit-btn:hover { background-color: #004494; }
        #console-output { background-color: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 4px; height: 150px; overflow-y: auto; font-family: monospace; margin-top: 10px; }
        .pass { color: #4CAF50; }
        .fail { color: #f44336; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Coding Challenge: Reverse a String</h2>
        <select id="experiment-group">
            <option value="honest">Group A (Honest)</option>
            <option value="cheat">Group B (Cheating)</option>
        </select>
    </div>

    <div id="editor-container"></div>

    <div class="controls">
        <button id="run-btn">Run & Test Code</button>
        <button id="submit-btn">Finish & Submit</button>
    </div>

    <div id="console-output">Ready to run tests...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <script src="app.js"></script>

</body>
</html>
