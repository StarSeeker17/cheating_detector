<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Challenge | Research Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;       
            --card-bg: #1e293b;        
            --text-main: #f8fafc;      
            --text-muted: #94a3b8;     
            --accent: #3b82f6;         
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents whole-page scrolling */
        }

        /* Top Navigation Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            height: 60px;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        select {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }

        /* The Split Layout */
        .workspace {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 60px);
            box-sizing: border-box;
        }

        /* Left Pane: Instructions */
        .panel-left {
            width: 35%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }
        .hidden { 
            display: none 
            !important; 
        }
        .panel-left h2 {
            margin-top: 0;
            color: var(--accent);
        }

        .task-description {
            color: var(--text-muted);
            line-height: 1.6;
            flex: 1;
        }

        code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #fbbf24;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            border: none;
        }

        #run-btn {
            background: transparent;
            color: var(--success);
            border: 2px solid var(--success);
        }

        #run-btn:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        #submit-btn {
            background: var(--accent);
            color: white;
        }

        #submit-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        #submit-btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        /* Right Pane: Editor & Console */
        .panel-right {
            width: 65%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .editor-wrapper {
            flex: 2; /* Takes up 2/3 of the right pane */
            border-radius: 12px;
            overflow: hidden; /* Crucial for Monaco resizing */
            border: 1px solid var(--border);
            position: relative;
        }

        #editor-container {
            width: 100%;
            height: 100%;
        }

        .console-wrapper {
            flex: 1; /* Takes up 1/3 of the right pane */
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 16px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            color: #d1d5db;
            position: relative;
        }

        .console-wrapper h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #consoleDiv {
            white-space: pre-wrap;
            font-size: 0.9rem;
        }

        .pass { color: var(--success); }
        .fail { color: var(--danger); }
        .normal { color: #d1d5db; }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease forwards, fadeOut 0.3s ease 3.7s forwards;
        }

        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--accent); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        /* Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.85); /* Dark semi-transparent background */
            backdrop-filter: blur(4px); /* Modern glass blur effect */
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
            opacity: 1; 
            transition: opacity 0.2s ease;
        }

        .modal-overlay.hidden {
            opacity: 0; 
            pointer-events: none; /* Prevents clicking when hidden */
        }

        .modal-content {
            background: var(--card-bg); 
            padding: 32px; 
            border-radius: 12px;
            max-width: 450px; width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--border);
            transform: scale(1); 
            transition: transform 0.2s ease;
        }

        .modal-overlay.hidden .modal-content {
            transform: scale(0.95); /* Slight pop-in animation */
        }

        .modal-actions {
            display: flex; 
            gap: 12px; 
            margin-top: 24px;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: none;
            box-shadow: none;
        }

        .btn-primary {
            background: var(--success); /* Green for final action */
        }

        .btn-primary:hover:not(:disabled) {
            background: #059669;
        }
    </style>
</head>
<body>

    <header>
        <h1>Session Environment</h1>
        <div id="timer-display" style="font-size: 1.5rem; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: 1px;">
            20:00
        </div>
    </header>

    <main class="workspace">
        <section class="panel-left">
            <h2 id="task-title">Loading Challenge...</h2>
            
            <div id="condition-banner" style="padding: 10px; border-radius: 6px; margin-bottom: 16px; font-weight: 600; font-size: 0.95rem;">
                </div>

            <div class="task-description" id="task-desc">
                </div>

            <div class="btn-group">
                <button id="run-btn">Run & Test Code</button>
                <button id="next-btn" style="background: var(--success); color: white;">Next Challenge ➔</button>
                <button id="submit-btn" class="hidden" style="background: var(--accent); color: white;">Finish & Submit</button>
            </div>
        </section>
        <section class="panel-right">
            <div class="editor-wrapper">
                <div id="editor-container"></div>
            </div>
            <div class="console-wrapper">
                <h3>Terminal Output</h3>
                <div id="consoleDiv">Waiting for execution...</div>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>

    <div id="submit-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Confirm Submission</h2>
            <p>Are you sure you are ready to submit your solution?</p>
            <div class="warning-box">
                <p><strong>Warning:</strong> This process is irreversible. Once submitted, your session will be locked and you cannot make further changes.</p>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancel</button>
                <button id="modal-confirm" class="btn-primary">Yes, Submit Solution</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
